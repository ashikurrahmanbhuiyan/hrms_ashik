spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hrms_ashik_test
    username: postgres
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
 
server:
  port: 8080




  spring:
    web:
      cors:
        allowed-origins: http://localhost:5173
        allowed-methods: GET, POST, PUT, DELETE, OPTIONS, PATCH
        allowed-headers: "*"
        allow-credentials: true